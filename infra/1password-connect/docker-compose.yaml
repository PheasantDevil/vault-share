# 1Password 公式例に準拠: https://github.com/1Password/connect/tree/main/examples/docker/compose
# 同ディレクトリに CLI で生成した 1password-credentials.json を置いてから起動する。

services:
  op-connect-api:
    image: 1password/connect-api:latest
    ports:
      - '8080:8080'
    volumes:
      - './1password-credentials.json:/home/opuser/.op/1password-credentials.json'
      - 'data:/home/opuser/.op/data'

  op-connect-sync:
    image: 1password/connect-sync:latest
    ports:
      - '8081:8080'
    volumes:
      - './1password-credentials.json:/home/opuser/.op/1password-credentials.json'
      - 'data:/home/opuser/.op/data'

volumes:
  data:
