name: E2E Tests

on:
  pull_request:
    paths:
      - "apps/web/src/**"
      - "apps/web/e2e/**"
      - ".github/workflows/test-e2e.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/src/**"
      - "apps/web/e2e/**"
      - ".github/workflows/test-e2e.yml"

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build monorepo dependencies
        run: pnpm run build

      - name: Install Playwright browsers
        run: |
          cd apps/web
          pnpm exec playwright install --with-deps chromium

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Start Firebase Emulators
        run: |
          pnpm add -g firebase-tools
          firebase emulators:start --only firestore,auth --project test-project &
          sleep 10

      - name: Seed E2E test user
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
        run: |
          cd apps/web
          pnpm run seed:e2e

      - name: Build application
        env:
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy-key-for-e2e
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_HOST: http://localhost:9099
        run: |
          cd apps/web
          pnpm build

      - name: Start application
        env:
          NODE_ENV: production
          PORT: 3000
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          SESSION_SECRET: test-secret-key-for-integration-tests-min-16-chars
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy-key-for-e2e
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_HOST: http://localhost:9099
        run: |
          cd apps/web
          pnpm start > /tmp/nextjs.log 2>&1 &
          echo $! > /tmp/nextjs.pid
          # アプリケーションが起動するまで待機
          for i in {1..60}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for application to start... ($i/60)"
            sleep 2
          done
          echo "Application failed to start"
          cat /tmp/nextjs.log
          exit 1

      - name: Run E2E tests
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
        run: |
          cd apps/web
          pnpm test:e2e

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/nextjs.pid ]; then
            kill $(cat /tmp/nextjs.pid) 2>/dev/null || true
          fi
          pkill -f "next start" || true
          pkill -f firebase || true
          cat /tmp/nextjs.log || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30
