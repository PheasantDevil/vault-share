name: E2E Tests

on:
  pull_request:
    paths:
      - "apps/web/src/**"
      - "apps/web/e2e/**"
      - ".github/workflows/test-e2e.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/src/**"
      - "apps/web/e2e/**"
      - ".github/workflows/test-e2e.yml"

jobs:
  e2e-test:
    runs-on: ubuntu-latest
    env:
      # アイテム API の暗号化（32 バイト base64）
      ITEM_ENCRYPTION_KEY: QkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkJCQkI=
      # セッション API は IP あたり 1 分 5 回 — E2E の複数ログイン + リトライで 429 になるため CI のみ無効化
      E2E_SKIP_RATE_LIMIT: "1"
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build monorepo dependencies
        run: pnpm run build

      - name: Install Playwright browsers
        run: |
          cd apps/web
          pnpm exec playwright install --with-deps chromium

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Start Firebase Emulators
        run: |
          firebase emulators:start --only firestore,auth --project test-project &
          # Auth (9099) と Firestore (8080) の両方が開くまで待機
          for i in $(seq 1 60); do
            if (echo >/dev/tcp/localhost/9099) 2>/dev/null && (echo >/dev/tcp/localhost/8080) 2>/dev/null; then
              echo "Firebase Emulators are ready"
              exit 0
            fi
            if [ "$i" -eq 60 ]; then
              echo "Emulators did not become ready in time"
              exit 1
            fi
            echo "Waiting for emulators... ($i/60)"
            sleep 1
          done

      - name: Seed E2E test user
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
        run: |
          cd apps/web
          for attempt in 1 2 3 4 5; do
            if pnpm run seed:e2e; then
              exit 0
            fi
            echo "Seed attempt $attempt failed, retrying in 3s..."
            sleep 3
          done
          echo "Seed E2E user failed after 5 attempts"
          exit 1

      - name: Build application
        env:
          NEXT_E2E_BUILD: "1"
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy-key-for-e2e
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_HOST: http://localhost:9099
          GOOGLE_CLOUD_PROJECT: test-project
          # /api/config がサーバーで FIREBASE_WEB_* を参照するため E2E でも揃える
          FIREBASE_WEB_API_KEY: dummy-key-for-e2e
          FIREBASE_WEB_AUTH_DOMAIN: localhost
          FIREBASE_WEB_PROJECT_ID: test-project
        run: |
          cd apps/web
          pnpm build

      - name: Start application
        env:
          NODE_ENV: production
          PORT: 3000
          # http://localhost での E2E では Secure Cookie が保存されずセッションが効かないため無効化
          SESSION_COOKIE_SECURE: "false"
          GOOGLE_CLOUD_PROJECT: test-project
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          SESSION_SECRET: test-secret-key-for-integration-tests-min-16-chars
          NEXT_PUBLIC_FIREBASE_API_KEY: dummy-key-for-e2e
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: localhost
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: test-project
          NEXT_PUBLIC_FIREBASE_AUTH_EMULATOR_HOST: http://localhost:9099
          FIREBASE_WEB_API_KEY: dummy-key-for-e2e
          FIREBASE_WEB_AUTH_DOMAIN: localhost
          FIREBASE_WEB_PROJECT_ID: test-project
        run: |
          cd apps/web
          pnpm start > /tmp/nextjs.log 2>&1 &
          echo $! > /tmp/nextjs.pid
          # アプリケーションが起動するまで待機
          for i in {1..60}; do
            if curl -f http://localhost:3000 > /dev/null 2>&1; then
              echo "Application is ready"
              exit 0
            fi
            echo "Waiting for application to start... ($i/60)"
            sleep 2
          done
          echo "Application failed to start"
          cat /tmp/nextjs.log
          exit 1

      - name: Run E2E tests
        env:
          PLAYWRIGHT_TEST_BASE_URL: http://localhost:3000
        run: |
          cd apps/web
          pnpm test:e2e

      - name: Stop application
        if: always()
        run: |
          if [ -f /tmp/nextjs.pid ]; then
            kill $(cat /tmp/nextjs.pid) 2>/dev/null || true
          fi
          pkill -f "next start" || true
          pkill -f firebase || true
          cat /tmp/nextjs.log || true

      - uses: actions/upload-artifact@v4
        if: always()
        with:
          name: playwright-report
          path: apps/web/playwright-report/
          retention-days: 30
