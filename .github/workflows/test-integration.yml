name: Integration Tests

on:
  pull_request:
    paths:
      - "apps/web/src/**"
      - "apps/web/src/test/integration/**"
      - ".github/workflows/test-integration.yml"
  push:
    branches:
      - main
    paths:
      - "apps/web/src/**"
      - "apps/web/src/test/integration/**"
      - ".github/workflows/test-integration.yml"

jobs:
  integration-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: pnpm/action-setup@v2
        with:
          version: 9

      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install

      - name: Build monorepo dependencies
        run: pnpm run build

      - name: Setup Java 21
        uses: actions/setup-java@v4
        with:
          distribution: "temurin"
          java-version: "21"

      - name: Install Firebase CLI
        run: pnpm add -g firebase-tools

      - name: Run integration tests with Firebase Emulators
        env:
          FIRESTORE_EMULATOR_HOST: localhost:8080
          FIREBASE_AUTH_EMULATOR_HOST: localhost:9099
          SESSION_SECRET: test-secret-key-for-integration-tests-min-16-chars
        run: |
          firebase emulators:exec --only firestore,auth --project test-project -- "cd apps/web && pnpm test:integration"
