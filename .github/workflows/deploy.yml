name: Deploy to Cloud Run

on:
  push:
    branches: [main]
  # マージ時の closed では走らせない（push の本番デプロイと競合し、--no-traffic だけの revision が最新になり得る）
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]

env:
  REGION: asia-northeast1

jobs:
  deploy:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
      pull-requests: write
    outputs:
      service_url: ${{ steps.deploy.outputs.url }}
      revision_name: ${{ steps.deploy.outputs.revision_name }}

    steps:
      - uses: actions/checkout@v4

      - name: Validate GCP configuration
        run: |
          WIP="${{ vars.WORKLOAD_IDENTITY_PROVIDER || secrets.WORKLOAD_IDENTITY_PROVIDER }}"
          SA="${{ vars.SERVICE_ACCOUNT || secrets.SERVICE_ACCOUNT }}"
          PROJ="${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          REG="${{ vars.GCP_REGION || secrets.GCP_REGION }}"
          if [ -z "$WIP" ] || [ -z "$SA" ] || [ -z "$PROJ" ] || [ -z "$REG" ]; then
            echo "::error::WORKLOAD_IDENTITY_PROVIDER, SERVICE_ACCOUNT, GCP_PROJECT_ID, GCP_REGION must be set."
            echo "Configure in: Settings → Secrets and variables → Actions → Variables (or Secrets)"
            echo "See docs/05-deployment/03-cicd-setup-gcp-and-github.md"
            exit 1
          fi

      - name: Authenticate to Google Cloud
        id: auth
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.WORKLOAD_IDENTITY_PROVIDER || secrets.WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.SERVICE_ACCOUNT || secrets.SERVICE_ACCOUNT }}

      - name: Set up Cloud SDK
        uses: google-github-actions/setup-gcloud@v2

      # firestore.indexes.json を本番プロジェクトへ同期（未作成だと古いクエリや別経路で 500 になり得る）
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      # GitHub Actions SA に datastores.indexes.create 相当の権限がないと 403 になる。
      # 権限は IAM で付与するか、手動で firebase deploy する。失敗時も Cloud Run デプロイは続行する。
      - name: Deploy Firestore indexes
        id: firestore_indexes
        continue-on-error: true
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
        run: |
          npx --yes firebase-tools@13.35.1 deploy --only firestore:indexes --project "$PROJECT_ID" --non-interactive

      - name: Log Firestore indexes deploy failure
        if: github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.firestore_indexes.outcome == 'failure'
        run: |
          echo "::warning::Firestore indexes deploy failed (often 403 IAM). Cloud Run deploy continues. Grant roles/datastore.indexAdmin to the GitHub Actions deploy SA, or run firebase deploy --only firestore:indexes locally. See docs/05-deployment/03-cicd-setup-gcp-and-github.md"

      - name: Configure Docker for Artifact Registry
        run: |
          REGION="${{ vars.GCP_REGION || secrets.GCP_REGION }}"
          gcloud auth configure-docker ${REGION}-docker.pkg.dev --quiet

      - name: Build and push
        id: build
        env:
          # Next.js standaloneモードでは、NEXT_PUBLIC_*はビルド時に埋め込まれるため、
          # ビルド時に環境変数を設定する必要がある
          NEXT_PUBLIC_FIREBASE_API_KEY: ${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}
          NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: vault-share-dev.firebaseapp.com
          NEXT_PUBLIC_FIREBASE_PROJECT_ID: ${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}
        run: |
          PROJECT_ID="${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION || secrets.GCP_REGION }}"
          REPO="$REGION-docker.pkg.dev/$PROJECT_ID/vault-share"
          IMAGE="$REPO/web"

          # Docker build時にARGとして環境変数を渡す
          # 環境変数が設定されていることを確認
          if [ -z "$NEXT_PUBLIC_FIREBASE_API_KEY" ]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_API_KEY is not set"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" ]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN is not set"
            exit 1
          fi
          if [ -z "$NEXT_PUBLIC_FIREBASE_PROJECT_ID" ]; then
            echo "::error::NEXT_PUBLIC_FIREBASE_PROJECT_ID is not set"
            exit 1
          fi

          docker build \
            --build-arg NEXT_PUBLIC_FIREBASE_API_KEY="$NEXT_PUBLIC_FIREBASE_API_KEY" \
            --build-arg NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN="$NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN" \
            --build-arg NEXT_PUBLIC_FIREBASE_PROJECT_ID="$NEXT_PUBLIC_FIREBASE_PROJECT_ID" \
            --build-arg BUILD_SHA="${{ github.sha }}" \
            -t "$IMAGE:${{ github.sha }}" .
          docker push "$IMAGE:${{ github.sha }}"
          echo "image=$IMAGE:${{ github.sha }}" >> $GITHUB_OUTPUT

      - name: Get current revision (for rollback)
        id: current_revision
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          PROJECT_ID="${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION || secrets.GCP_REGION }}"
          SERVICE="vault-share-web"

          # 現在のリビジョンを取得（ロールバック用）
          CURRENT_REVISION=$(gcloud run services describe "$SERVICE" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --format='value(status.latestReadyRevisionName)' 2>/dev/null || echo "")

          if [ -n "$CURRENT_REVISION" ]; then
            echo "revision=$CURRENT_REVISION" >> $GITHUB_OUTPUT
            echo "Current revision: $CURRENT_REVISION"
          fi

      - name: Deploy to Cloud Run
        id: deploy
        env:
          # bash 内で event 名の文字列比較がずれる事故を避け、PR プレビューのみ --no-traffic を付ける
          IS_PR_PREVIEW: ${{ github.event_name == 'pull_request' }}
          PR_NUMBER: ${{ github.event_name == 'pull_request' && github.event.pull_request.number || '' }}
        run: |
          set -e
          PROJECT_ID="${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION || secrets.GCP_REGION }}"
          IMAGE=${{ steps.build.outputs.image }}
          SERVICE="vault-share-web"

          # 環境変数ファイルを作成（YAMLパーサーに誤解されないよう echo で出力）
          ENV_VARS_FILE="/tmp/env-vars.yaml"
          {
            echo "NEXT_PUBLIC_FIREBASE_AUTH_DOMAIN: vault-share-dev.firebaseapp.com"
            echo "NEXT_PUBLIC_FIREBASE_PROJECT_ID: $PROJECT_ID"
            echo "GOOGLE_CLOUD_PROJECT: $PROJECT_ID"
            # Route Handler /api/config は NEXT_PUBLIC_* のビルド時インライン化を避けるため FIREBASE_WEB_* を参照する
            echo "FIREBASE_WEB_AUTH_DOMAIN: vault-share-dev.firebaseapp.com"
            echo "FIREBASE_WEB_PROJECT_ID: $PROJECT_ID"
          } > "$ENV_VARS_FILE"

          # GitHub Secretsから環境変数を追加（存在する場合）
          # ビルド時に設定されているため、ランタイムでも設定する必要がある
          if [ -n "${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}" ]; then
            # YAMLパーサの解釈事故を避けるため必ずクォートして書き込む
            echo "NEXT_PUBLIC_FIREBASE_API_KEY: \"${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}\"" >> "$ENV_VARS_FILE"
            echo "FIREBASE_WEB_API_KEY: \"${{ secrets.NEXT_PUBLIC_FIREBASE_API_KEY }}\"" >> "$ENV_VARS_FILE"
          else
            echo "::error::NEXT_PUBLIC_FIREBASE_API_KEY is not set in GitHub Secrets"
            exit 1
          fi
          # ブロックリスト管理 API 用（任意・カンマ区切りメール）
          if [ -n "${{ secrets.ADMIN_EMAILS }}" ]; then
            echo "ADMIN_EMAILS: \"${{ secrets.ADMIN_EMAILS }}\"" >> "$ENV_VARS_FILE"
          fi

          # 1Password Connect（任意）: Secret または Variable の ONEPASSWORD_CONNECT_URL が空でないときだけ有効化
          # （Secret を優先。未設定なら Variable を参照）
          # GCP Secret Manager の vault-share-onepassword-connect-token を ONEPASSWORD_CONNECT_TOKEN として注入する。
          # 事前準備: scripts/gcp/setup-onepassword-connect-secret.sh と docs/05-deployment/05-onepassword-connect-cloud-run.md 参照
          OP_URL="${{ secrets.ONEPASSWORD_CONNECT_URL }}"
          if [ -z "$OP_URL" ]; then
            OP_URL="${{ vars.ONEPASSWORD_CONNECT_URL }}"
          fi
          if [ -n "$OP_URL" ]; then
            echo "ONEPASSWORD_CONNECT_URL: \"$OP_URL\"" >> "$ENV_VARS_FILE"
            EXTRA_OP_SECRET=',ONEPASSWORD_CONNECT_TOKEN=vault-share-onepassword-connect-token:latest'
          else
            EXTRA_OP_SECRET=""
          fi

          # Secret Manager からシークレットを読み込む（必須）
          # SESSION_SECRET: Cookie 署名
          # ITEM_ENCRYPTION_KEY: アイテム本文の AES-256-GCM（32 バイト base64）。未設定だと /api/groups/.../items が 500 になる
          # （権限不足で参照できないとデプロイ失敗とするため、先に setup-item-encryption-key-secret.sh でシークレットと IAM を用意すること）
          SECRETS="SESSION_SECRET=vault-share-session-secret:latest,ITEM_ENCRYPTION_KEY=vault-share-item-encryption-key:latest${EXTRA_OP_SECRET}"

          if [ "$IS_PR_PREVIEW" = "true" ] && [ -n "$PR_NUMBER" ]; then
            TAG="pr-$PR_NUMBER"
            # --no-traffic は既存サービスへのデプロイ時のみ使用可能（初回作成時は不可）
            if gcloud run services describe "$SERVICE" --region="$REGION" --project="$PROJECT_ID" &>/dev/null; then
              FLAGS="--tag=$TAG --no-traffic"
            else
              FLAGS="--tag=$TAG"
            fi
          else
            TAG=""
            FLAGS=""
          fi

          # デプロイコマンドの構築
          DEPLOY_CMD="gcloud run deploy \"$SERVICE\" \
            --image=\"$IMAGE\" \
            --region=\"$REGION\" \
            --project=\"$PROJECT_ID\" \
            --platform=managed \
            --allow-unauthenticated \
            --env-vars-file=\"$ENV_VARS_FILE\""

          if [ -n "$SECRETS" ]; then
            DEPLOY_CMD="$DEPLOY_CMD --set-secrets=\"$SECRETS\""
          fi

          DEPLOY_CMD="$DEPLOY_CMD $FLAGS --quiet"

          # デプロイ実行
          if ! eval "$DEPLOY_CMD"; then
            echo "::error::Deployment failed"
            exit 1
          fi

          # リビジョン名を取得
          REVISION_NAME=$(gcloud run services describe "$SERVICE" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --format='value(status.latestReadyRevisionName)')
          echo "revision_name=$REVISION_NAME" >> $GITHUB_OUTPUT

          # main URL が常に最新 revision にルーティングされるようにする
          #（過去の no-traffic デプロイが残っていると、最新コードでも古い revision を参照し続けるため）
          if [ "${{ github.event_name }}" = "push" ]; then
            gcloud run services update-traffic "$SERVICE" \
              --region="$REGION" \
              --project="$PROJECT_ID" \
              --to-revisions="$REVISION_NAME=100" \
              --quiet
          fi

          if [ -n "$TAG" ]; then
            BASE_URL=$(gcloud run services describe "$SERVICE" --region="$REGION" --project="$PROJECT_ID" --format='value(status.url)')
            PREVIEW_URL=$(echo "$BASE_URL" | sed "s|https://|https://$TAG---|")
            echo "url=$PREVIEW_URL" >> $GITHUB_OUTPUT
          else
            gcloud run services describe "$SERVICE" --region="$REGION" --project="$PROJECT_ID" --format='value(status.url)' > url.txt
            echo "url=$(cat url.txt)" >> $GITHUB_OUTPUT
          fi

      - name: Rollback on failure
        if: failure() && github.event_name == 'push' && github.ref == 'refs/heads/main' && steps.current_revision.outputs.revision != ''
        run: |
          PROJECT_ID="${{ vars.GCP_PROJECT_ID || secrets.GCP_PROJECT_ID }}"
          REGION="${{ vars.GCP_REGION || secrets.GCP_REGION }}"
          SERVICE="vault-share-web"
          PREVIOUS_REVISION="${{ steps.current_revision.outputs.revision }}"

          echo "::warning::Deployment failed. Rolling back to previous revision: $PREVIOUS_REVISION"

          gcloud run services update-traffic "$SERVICE" \
            --region="$REGION" \
            --project="$PROJECT_ID" \
            --to-revisions="$PREVIOUS_REVISION=100" \
            --quiet

          echo "::notice::Rolled back to revision: $PREVIOUS_REVISION"

      - name: Comment on PR (preview)
        if: github.event_name == 'pull_request'
        uses: actions/github-script@v7
        with:
          script: |
            const url = "${{ steps.deploy.outputs.url }}";
            const revision = "${{ steps.deploy.outputs.revision_name }}";
            const body = `## プレビュー環境\n\nデプロイが完了しました。\n\n**URL**: ${url}\n**リビジョン**: ${revision}`;
            github.rest.issues.createComment({
              issue_number: context.issue.number,
              owner: context.repo.owner,
              repo: context.repo.repo,
              body: body
            });
